name: Homebrew

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_num=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        run: |
          VERSION=${{ steps.release.outputs.version }}
          BASE_URL="https://github.com/brunoborges/ghcd/releases/download/${VERSION}"

          for platform in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64; do
            curl -sL "${BASE_URL}/ghcd-${platform}.tar.gz" -o "ghcd-${platform}.tar.gz"
            shasum -a 256 "ghcd-${platform}.tar.gz" >> checksums.txt
          done

          echo "Checksums:"
          cat checksums.txt

          # Export checksums for formula
          echo "SHA_DARWIN_ARM64=$(grep darwin-arm64 checksums.txt | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_DARWIN_AMD64=$(grep darwin-amd64 checksums.txt | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_LINUX_AMD64=$(grep linux-amd64 checksums.txt | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_LINUX_ARM64=$(grep linux-arm64 checksums.txt | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Generate Homebrew formula
        run: |
          VERSION=${{ steps.release.outputs.version }}
          VERSION_NUM=${{ steps.release.outputs.version_num }}
          BASE_URL="https://github.com/brunoborges/ghcd/releases/download/${VERSION}"

          cat > ghcd.rb << FORMULA
          class Ghcd < Formula
            desc "GitHub CLI Cache Proxy — caching daemon for gh to prevent API rate limiting"
            homepage "https://github.com/brunoborges/ghcd"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/ghcd-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE_URL}/ghcd-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/ghcd-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE_URL}/ghcd-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "ghc"
              bin.install "ghcd"
            end

            test do
              assert_match "ghcd", shell_output("#{bin}/ghcd --help")
            end
          end
          FORMULA

          # Clean up leading whitespace from heredoc
          sed -i 's/^          //' ghcd.rb
          echo "Generated formula:"
          cat ghcd.rb

      - name: Push to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: ghcd.rb
          destination_repo: brunoborges/homebrew-tap
          destination_folder: Formula
          user_email: brborges@microsoft.com
          user_name: Bruno Borges
          commit_message: "Update ghcd to ${{ steps.release.outputs.version }}"
